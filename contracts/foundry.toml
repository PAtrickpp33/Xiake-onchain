[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

# Fuzz + invariant defaults
[fuzz]
runs = 256

[invariant]
runs = 64
depth = 32

# Remappings (OpenZeppelin installed via `forge install openzeppelin/openzeppelin-contracts`)
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# RPC endpoints (used by forge script + tests)
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC}"
base         = "${BASE_RPC}"

# Etherscan/Basescan verification config
[etherscan]
base_sepolia = { key = "${BASESCAN_KEY}", url = "https://api-sepolia.basescan.org/api", chain = 84532 }
base         = { key = "${BASESCAN_KEY}", url = "https://api.basescan.org/api", chain = 8453 }
