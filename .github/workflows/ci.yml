name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: forge build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      # forge-std + openzeppelin-contracts are checked in as git submodules
      # (see contracts/lib/). `actions/checkout@v4` with `submodules: recursive`
      # pulls them, so no `forge install` step is needed.

      - name: forge build
        run: forge build --sizes

      - name: forge test
        run: forge test -vvv

      # Informational only — gas numbers drift between foundry versions and
      # evm_version targets, so we don't block CI on them. For local
      # regression protection run `forge snapshot --check` against a pinned
      # toolchain.
      - name: gas snapshot (informational)
        run: forge snapshot --diff
        continue-on-error: true

  skill:
    name: tsc + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skill/package-lock.json

      - name: Install deps
        run: npm ci || npm install

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present
